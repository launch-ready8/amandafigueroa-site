document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

 U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n/* cyrillic */\n@font-face {\n  font-family: 'Anonymous Pro';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"a48d0058-d892-4467-966d-749d2a45bba0\") format('woff2');\n  unicode-range: U+0301, U+0400-045F, U+0490-0491, U+04B0-04B1, U+2116;\n}\n/* greek */\n@font-face {\n  font-family: 'Anonymous Pro';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"e35d418d-e797-4d24-8c6e-de2c41f13437\") format('woff2');\n  unicode-range: U+0370-0377, U+037A-037F, U+0384-038A, U+038C, U+038E-03A1, U+03A3-03FF;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Anonymous Pro';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"35d902ad-9a5e-4aaa-83ba-26b2e2d2546a\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Anonymous Pro';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"ea357707-130f-4576-98c6-2cec08ae3521\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n\n\n/* Stack Sans Notch — Koto's notched display sans (self-hosted via Fontsource CDN) */\n@font-face {\n  font-family: 'Stack Sans Notch';\n  font-style: normal;\n  font-weight: 200 700;\n  font-display: swap;\n  src: url(\"54a97d72-14af-4749-9091-2b2310d12e8f\") format('woff2-variations'),\n       url(\"f9c2352e-c527-45f3-85f6-4459f88f1529\") format('woff2');\n}\n\n/* =========================================================\n   AMANDA FIGUEROA — DESIGN SYSTEM\n   \"Street Editorial\" — collage energy, growth-marketer brain\n   Display: Stack Sans Notch  ·  Text: Anonymous Pro\n   ========================================================= */\n\n/* ---------- TOKENS ---------- */\n:root {\n  /* core palette */\n  --cobalt:      #1E2BC4;\n  --cobalt-deep: #141C8F;\n  --cobalt-soft: #4253E8;\n  --butter:      #FCE96A;\n  --butter-deep: #F3D63B;\n  --ink:         #15140F;\n  --ink-70:      #3a382f;\n  --ink-45:      #6b685e;\n  --ink-15:      #d9d6cc;\n  --signal:      #E5402E; /* sticker pop, used sparingly */\n\n  /* neutrals — switchable */\n  --cream:  #F4EFE1;\n  --bone:   #ECEAE3;\n  --paper:  #FFFFFF;\n  --canvas: var(--bone);     /* page bg, themed below */\n\n  /* fonts */\n  --font-display: 'Stack Sans Notch', sans-serif;\n  --font-serif-display: 'Anonymous Pro', serif;  /* big, short, punchy — feed posts, pull quotes */\n  --font-serif-text:    'Anonymous Pro', serif;          /* readable at length — website, long copy */\n  --font-body:    'Anonymous Pro', sans-serif;\n\n  /* radius */\n  --r-sharp: 2px;\n  --r-soft:  6px;\n  --r-pill:  999px;\n\n  /* shadow */\n  --shadow-card: 0 18px 40px -22px rgba(21,20,15,.45);\n  --shadow-lift: 0 6px 0 0 var(--ink);\n\n  /* layout */\n  --maxw: 1200px;\n  --gutter: clamp(20px, 5vw, 72px);\n}\n\n/* neutral variants */\nbody[data-neutral=\"cream\"] { --canvas: var(--cream); }\nbody[data-neutral=\"bone\"]  { --canvas: var(--bone); }\n\n/* headline: Stack Sans Notch, run heavy + slightly looser than the old\n   condensed Anton metrics (Anton was ultra-condensed; Notch is normal width) */\nbody { --font-display: 'Stack Sans Notch', sans-serif; }\n\n/* Stack Sans Notch reads best BOLD at display sizes. These carry weight to the\n   shared headline patterns even where page styles set font-weight:400 for Anton. */\n.display, .display.is-condensed,\n.sec-head h2, .sec-head .num,\n.lb .lb-display { font-weight: 700 !important; letter-spacing: -0.02em; }\n.display { line-height: 0.94; }\n\n/* ---------- RESET ---------- */\n* { box-sizing: border-box; }\nhtml { -webkit-text-size-adjust: 100%; }\nbody {\n  margin: 0;\n  background-color: var(--canvas);\n  color: var(--ink);\n  font-family: var(--font-body);\n  font-size: 17px;\n  line-height: 1.55;\n  -webkit-font-smoothing: antialiased;\n  text-rendering: optimizeLegibility;\n}\nimg { max-width: 100%; display: block; }\na { color: inherit; }\n\n/* ---------- TYPE PRIMITIVES ---------- */\n.display {\n  font-family: var(--font-display);\n  font-weight: 400;\n  line-height: 0.92;\n  letter-spacing: -0.01em;\n  text-transform: uppercase;\n  margin: 0;\n}\n/* Anton headlines are always uppercase */\n.display.is-condensed {\n  font-family: 'Stack Sans Notch', sans-serif;\n  font-weight: 400;\n  text-transform: uppercase;\n  letter-spacing: -0.005em;\n  line-height: 0.9;\n}\n/* DISPLAY SERIF — DM Serif Display. Big editorial moments, feed posts, pull quotes. */\n.serif {\n  font-family: var(--font-serif-display);\n  font-weight: 400;\n  line-height: 1.05;\n  letter-spacing: -0.015em;\n  margin: 0;\n}\n/* TEXT SERIF — Spectral. Web reading, sub-heads, longer serif passages. */\n.serif-text {\n  font-family: var(--font-serif-text);\n  font-weight: 500;\n  line-height: 1.45;\n  letter-spacing: -0.003em;\n  margin: 0;\n}\n.serif-italic { font-style: italic; }\n\n.eyebrow {\n  font-family: var(--font-body);\n  font-weight: 700;\n  text-transform: uppercase;\n  letter-spacing: 0.18em;\n  font-size: 12px;\n  color: var(--ink-70);\n  margin: 0;\n}\n.eyebrow.on-dark { color: rgba(255,255,255,.7); }\n\n.lede { font-size: clamp(18px, 2.2vw, 22px); line-height: 1.5; color: var(--ink-70); }\n.body-sm { font-size: 15.5px; line-height: 1.55; color: var(--ink-70); }\n\n/* highlighter mark */\n.mark {\n  background: var(--butter);\n  box-decoration-break: clone;\n  -webkit-box-decoration-break: clone;\n  padding: 0.04em 0.22em;\n  margin: 0 -0.04em;\n}\n.mark.blue { background: var(--cobalt); color: #fff; }\n\n/* underline-tick accent */\n.tick { position: relative; white-space: nowrap; }\n.tick::after {\n  content: \"\"; position: absolute; left: 0; right: 0; bottom: -0.12em;\n  height: 0.18em; background: var(--cobalt);\n}\n\n/* ---------- LAYOUT ---------- */\n.wrap { max-width: var(--maxw); margin: 0 auto; padding: 0 var(--gutter); }\n.section { padding: clamp(56px, 9vw, 120px) 0; }\n.section.tight { padding: clamp(40px, 6vw, 72px) 0; }\n.section.cobalt { background: var(--cobalt); color: #fff; }\n.section.ink { background: var(--ink); color: #fff; }\n.section.paper { background: var(--paper); }\n.divider { height: 1.5px; background: var(--ink); opacity: .12; }\n\n.grid { display: grid; gap: clamp(20px, 3vw, 40px); }\n.cols-2 { grid-template-columns: repeat(2, 1fr); }\n.cols-3 { grid-template-columns: repeat(3, 1fr); }\n.cols-4 { grid-template-columns: repeat(4, 1fr); }\n@media (max-width: 860px) {\n  .cols-2, .cols-3, .cols-4 { grid-template-columns: 1fr; }\n}\n\n/* section header pattern */\n.sec-head { display: flex; align-items: baseline; gap: 16px; margin-bottom: 36px; flex-wrap: wrap; }\n.sec-head .num {\n  font-family: 'Stack Sans Notch', sans-serif; font-size: 13px; letter-spacing: .04em;\n  border: 1.5px solid currentColor; border-radius: var(--r-pill);\n  padding: 4px 12px; opacity: .65;\n}\n.sec-head h2 { font-family: 'Stack Sans Notch', sans-serif; font-weight: 400; text-transform: uppercase;\n  font-size: clamp(26px, 4vw, 44px); line-height: .95; letter-spacing: -0.01em; margin: 0; }\n\n/* =========================================================\n   COMPONENTS\n   ========================================================= */\n\n/* ---------- BUTTONS ---------- */\n.btn {\n  display: inline-flex; align-items: center; gap: 12px;\n  font-family: var(--font-body); font-weight: 700; text-transform: uppercase;\n  letter-spacing: 0.08em; font-size: 13px;\n  padding: 15px 26px; border: 1.5px solid var(--ink); border-radius: var(--r-sharp);\n  background: var(--butter); color: var(--ink); cursor: pointer;\n  text-decoration: none; transition: transform .12s ease, box-shadow .12s ease, background .2s ease;\n}\n.btn .arw { display: grid; place-items: center; width: 24px; height: 24px;\n  background: var(--paper); border: 1.5px solid var(--ink); border-radius: var(--r-sharp); }\n.btn:hover { transform: translate(-2px,-2px); box-shadow: var(--shadow-lift); }\n.btn:active { transform: translate(0,0); box-shadow: none; }\n.btn.blue { background: var(--cobalt); color: #fff; border-color: var(--ink); }\n.btn.blue .arw { background: var(--butter); color: var(--ink); }\n.btn.ghost { background: transparent; }\n.btn.pill { border-radius: var(--r-pill); }\n.btn.pill .arw { border-radius: var(--r-pill); }\n.btn.lg { font-size: 15px; padding: 18px 32px; }\n.btn.sm { font-size: 11px; padding: 10px 16px; gap: 8px; }\n\n/* ---------- STICKER BADGE ---------- */\n.sticker {\n  display: inline-flex; align-items: center; gap: 6px;\n  font-family: var(--font-body); font-weight: 800; text-transform: uppercase;\n  letter-spacing: 0.06em; font-size: 11px; line-height: 1.05;\n  padding: 9px 16px; border: 1.5px solid var(--ink);\n  border-radius: var(--r-pill); background: var(--paper); color: var(--ink);\n  text-align: center;\n}\n.sticker.butter { background: var(--butter); }\n.sticker.blue { background: var(--cobalt); color: #fff; border-color: var(--ink); }\n.sticker.signal { background: var(--signal); color: #fff; border-color: var(--ink); }\n.sticker.dashed { border-style: dashed; }\n.sticker.tilt-l { transform: rotate(-6deg); }\n.sticker.tilt-r { transform: rotate(5deg); }\n.sticker .stk-2 { display: block; font-size: 8.5px; opacity: .8; }\n\n/* ---------- CALLOUT / TEXT BOX ---------- */\n.callout {\n  position: relative; background: var(--paper); border: 1.5px solid var(--ink);\n  border-radius: var(--r-soft); padding: 22px 24px;\n  box-shadow: 6px 6px 0 0 var(--ink);\n}\n.callout.butter { background: var(--butter); }\n.callout.blue { background: var(--cobalt); color: #fff; box-shadow: 6px 6px 0 0 var(--ink); }\n dth:720px){ .cs-cover{ aspect-ratio:auto; } }\n.cc-top { display:flex; justify-content:space-between; gap:20px; }\n.cc-top span { font-family:var(--font-body); font-weight:700; text-transform:uppercase; letter-spacing:.14em; font-size:11px; color:rgba(255,255,255,.65); }\n.cc-metric { font-family:'Stack Sans Notch',sans-serif; font-size:clamp(66px,12vw,150px); line-height:.86; color:var(--butter); letter-spacing:-0.03em; }\n.cc-mlabel { font-family:var(--font-serif-text); font-size:clamp(16px,1.8vw,21px); color:rgba(255,255,255,.9); max-width:40ch; margin-top:14px; }\n\n/* ---------- CONTENT SECTIONS ---------- */\n.cs-block { display:grid; grid-template-columns:.4fr 1.6fr; gap:clamp(24px,5vw,72px); align-items:start; padding:clamp(40px,6vw,80px) 0; border-top:1.5px solid var(--ink-15); }\n@media(max-width:720px){ .cs-block{ grid-template-columns:1fr; gap:18px; } }\n.cs-block .b-label { font-family:var(--font-body); font-weight:700; text-transform:uppercase; letter-spacing:.14em; font-size:14px; color:var(--cobalt); padding-top:8px; }\n.cs-block h2 { font-family:'Stack Sans Notch',sans-serif; text-transform:uppercase; font-weight:400; font-size:clamp(24px,3.4vw,40px); line-height:1.02; letter-spacing:-0.01em; margin:0 0 28px; padding-bottom:.03em; max-width:22ch; }\n.cs-block p { font-family:var(--font-serif-text); font-size:clamp(16px,1.5vw,18.5px); line-height:1.62; color:var(--ink-70); margin:0 0 18px; max-width:62ch; }\n.cs-block p strong { color:var(--ink); font-weight:600; }\n.pull { margin-top:10px; }\n\n/* ---------- LEVER DIAGRAM ---------- */\n.lever { display:grid; gap:14px; margin:8px 0 30px; max-width:64ch; }\n.lever-cap { font-family:var(--font-body); font-weight:700; text-transform:uppercase; letter-spacing:.14em; font-size:10.5px; color:var(--ink-45); margin:0 0 6px; }\n.lever-row { display:grid; grid-template-columns:1fr auto 1fr auto 1.15fr; align-items:center; gap:14px; background:var(--paper); border:1.5px solid var(--ink); border-radius:var(--r-soft); padding:16px 20px; box-shadow:3px 3px 0 0 var(--ink); }\n.lv-tag { display:inline-block; font-family:var(--font-body); font-weight:800; text-transform:uppercase; letter-spacing:.05em; font-size:11.5px; line-height:1.2; background:var(--butter); border:1.5px solid var(--ink); border-radius:var(--r-pill); padding:6px 13px; color:var(--ink); }\n.lv-diag { font-family:var(--font-serif-text); font-size:14.5px; line-height:1.4; color:var(--ink-70); margin:0; }\n.lv-fix { font-family:var(--font-body); font-weight:700; font-size:13.5px; line-height:1.4; color:var(--ink); margin:0; }\n.lv-arw { font-family:var(--font-body); font-weight:800; font-size:20px; color:var(--cobalt); line-height:1; }\n@media(max-width:640px){\n  .lever-row{ grid-template-columns:1fr; gap:10px; text-align:left; }\n  .lv-arw{ transform:rotate(90deg); justify-self:start; font-size:16px; }\n}\n\n/* ---------- SEARCH → AD → PAGE FLOW ---------- */\n.flow { display:grid; grid-template-columns:1fr auto 1fr auto 1fr; align-items:stretch; gap:14px; margin:8px 0 8px; max-width:64ch; }\n.flow-node { background:var(--cobalt); color:#fff; border:1.5px solid var(--ink); border-radius:var(--r-soft); padding:18px 20px; box-shadow:4px 4px 0 0 var(--ink); }\n.flow-node .fn-k { display:block; font-family:'Stack Sans Notch',sans-serif; text-transform:uppercase; font-size:15px; letter-spacing:.01em; }\n.flow-node p { font-family:var(--font-serif-text); font-size:13.5px; line-height:1.4; color:rgba(255,255,255,.85); margin:8px 0 0; }\n.flow-arw { display:grid; place-items:center; font-family:var(--font-body); font-weight:800; font-size:26px; color:var(--butter-deep); }\n@media(max-width:640px){\n  .flow{ grid-template-columns:1fr; }\n  .flow-arw{ transform:rotate(90deg); }\n}\n\n/* ---------- COST/CONVERSION CHART ---------- */\n.chart-panel { background:var(--cobalt); border:1.5px solid var(--ink); border-radius:var(--r-soft); padding:clamp(24px,3.4vw,40px); color:#fff; }\n.chart-head { display:flex; justify-content:space-between; align-items:flex-start; gap:20px; flex-wrap:wrap; margin-bottom:22px; }\n.chart-head h3 { font-family:'Stack Sans Notch',sans-serif; text-transform:uppercase; font-weight:400; font-size:clamp(18px,2.4vw,26px); line-height:1.02; letter-spacing:-0.01em; margin:0; max-width:20ch; }\n.chart-legend { display:flex; gap:18px; flex-wrap:wrap; }\n.chart-legend span { display:inline-flex; align-items:center; gap:8px; font-family:var(--font-body); font-weight:700; text-transform:uppercase; letter-spacing:.08em; font-size:10.5px; color:rgba(255,255,255,.9); }\n.chart-legend i { width:16px; height:0; border-top:3px solid #fff; display:inline-block; }\n.chart-legend i.up { border-top:3px solid var(--butter); }\n.chart-svg { width:100%; height:auto; display:block; }\n.chart-note { font-family:var(--font-body); font-weight:700; text-transform:uppercase; letter-spacing:.1em; font-size:10.5px; color:rgba(255,255,255,.6); margin:16px 0 0; }\n\n/* ---------- RESULTS ---------- */\n.cs-results { background:var(--paper); padding-bottom:clamp(40px,5vw,64px); }\n.results-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:22px; margin-top:clamp(28px,4vw,44px); }\n@media(max-width:720px){ .results-grid{ grid-template-columns:1fr; } }\n.result { background:var(--cobalt); border:1.5px solid var(--ink); border-radius:var(--r-soft); padding:28px 24px; box-shadow:6px 6px 0 0 var(--ink); }\n.result .num { font-family:'Stack Sans Notch',sans-serif; font-size:clamp(40px,5vw,60px); line-height:.9; color:var(--butter); letter-spacing:-0.02em; }\n.result .desc { font-family:var(--font-serif-text); font-size:14.5px; color:rgba(255,255,255,.9); margin-top:14px; line-height:1.5; }\n\n/* ---------- NEXT ---------- */\n.cs-next { border-top:1.5px solid var(--ink); padding:clamp(36px,5vw,64px) 0; }\n.cs-next a { display:flex; align-items:center; justify-content:space-between; gap:24px; text-decoration:none; color:var(--ink); }\n.cs-next .nlabel { font-family:var(--font-body); font-weight:700; text-transform:uppercase; letter-spacing:.12em; font-size:11px; color:var(--ink-45); margin-bottom:10px; }\n.cs-next h3 { font-family:'Stack Sans Notch',sans-serif; text-transform:uppercase; font-weight:400; font-size:clamp(24px,4vw,46px); line-height:.96; letter-spacing:-0.01em; margin:0; max-width:20ch; transition:color .2s, transform .25s; }\n.cs-next a:hover h3 { color:var(--cobalt); transform:translateX(6px); }\n.cs-next .arw-lg { width:52px; height:52px; border-radius:50%; background:var(--ink); color:#fff; display:grid; place-items:center; flex-shrink:0; transition:background .2s; font-size:22px; }\n.cs-next a:hover .arw-lg { background:var(--cobalt); }\n\n/* ---------- FIGURES / SECTION BREAKS ---------- */\n.cs-figure { margin:0 0 clamp(22px,3vw,38px); }\n.cs-img { display:block; width:100%; aspect-ratio:16/9; border:1.5px solid var(--ink); border-radius:var(--r-soft); overflow:hidden; background:var(--ink); }\n.cs-img img { width:100%; height:100%; object-fit:cover; display:block; }\n.cs-cap { font-family:var(--font-body); font-weight:700; text-transform:uppercase; letter-spacing:.1em; font-size:10.5px; color:var(--ink-45); margin:12px 0 0; display:flex; align-items:center; gap:8px; }\n.cs-cap img { image-rendering:pixelated; height:16px; width:auto; }\n.b-label img { image-rendering:pixelated; height:15px; width:auto; vertical-align:-2px; margin-right:7px; }\n\n/* ---------- SEO THREAD ---------- */\n.cs-thread { background:var(--bone); }\n.thread-panel { position:relative; background:var(--paper); color:var(--ink); border:1.5px solid var(--ink); border-radius:var(--r-soft); box-shadow:var(--shadow-card); padding:clamp(30px,4vw,50px); }\n.thread-label { font-family:var(--font-body); font-weight:700; text-transform:uppercase; letter-spacing:.14em; font-size:14px; color:var(--cobalt); margin:0 0 20px; display:flex; align-items:center; gap:8px; }\n.thread-label img { image-rendering:pixelated; height:16px; width:auto; }\n.thread-grid { display:grid; grid-template-columns:1fr 1.3fr; gap:clamp(24px,4vw,56px); align-items:start; }\n@media(max-width:720px){ .thread-grid{ grid-template-columns:1fr; gap:16px; } }\n.thread-panel h2 { font-family:'Stack Sans Notch',sans-serif; text-transform:uppercase; font-weight:400; font-size:clamp(24px,3.4vw,40px); line-height:1.02; letter-spacing:-0.01em; margin:0; color:var(--ink); max-width:16ch; }\n.thread-panel p { font-family:var(--font-serif-text); font-size:clamp(16px,1.5vw,18.5px); line-height:1.62; color:var(--ink-70); margin:0; max-width:60ch; }\n\n/* ---------- FOOTER ---------- */\n.foot .f-links { display:flex; gap:22px; justify-content:flex-end; flex-wrap:wrap; }\n.foot .f-links a { font-family:var(--font-body); font-weight:700; text-transform:uppercase; letter-spacing:.1em; font-size:11px; color:rgba(255,255,255,.8); text-decoration:none; }\n.foot .f-links a:hover { color:var(--butter); }\n.foot .f-bottom { display:flex; justify-content:space-between; gap:16px; flex-wrap:wrap; margin-top:40px; padding-top:20px; border-top:1px solid rgba(255,255,255,.18); font-size:12px; color:rgba(255,255,255,.5); }\n@media(max-width:820px){ .foot .f-links{ justify-content:flex-start; } }\n<\u002Fstyle>\n<\u002Fhead>\n<body data-neutral=\"bone\">\n\n<nav class=\"site-nav\">\n  <a class=\"brand\" href=\"../Amanda%20Figueroa%20-%20Website.html\">AMANDA<b>·<\u002Fb>FIGUEROA<\u002Fa>\n  <span class=\"links\">\n    <a href=\"../work.html\" aria-current=\"page\">Work<\u002Fa>\n    <a href=\"../Amanda%20Figueroa%20-%20Website.html#services\">Services<\u002Fa>\n    <a href=\"../about.html\">About Me<\u002Fa>\n    <a href=\"../contact.html\" class=\"cta\">Start a project ↗<\u002Fa>\n  <\u002Fspan>\n<\u002Fnav>\n\n<header class=\"cs-hero\" data-screen-label=\"Case study hero\">\n  <div class=\"wrap\">\n    <a class=\"back\" href=\"../work.html\">← All work<\u002Fa>\n    <p class=\"eyebrow\">Case study · Healthcare SaaS<\u002Fp>\n    <h1 class=\"cs-title\">Rebuilding paid search around <span class=\"mark\">return<\u002Fspan>, not volume.<\u002Fh1>\n    <p class=\"lede\">They were spending millions a year on search. We rebuilt the program to turn that spend into pipeline.<\u002Fp>\n    <div class=\"cs-meta\">\n      <div><span class=\"m-label\">Industry<\u002Fspan><span class=\"m-val\">Healthcare SaaS · Enterprise Data &amp; Analytics<\u002Fspan><\u002Fdiv>\n      <div><span class=\"m-label\">Role<\u002Fspan><span class=\"m-val\">Paid Search Lead<\u002Fspan><\u002Fdiv>\n      <div><span class=\"m-label\">Services<\u002Fspan><span class=\"m-val\">PPC · Search Intent · Landing Pages · Reporting<\u002Fspan><\u002Fdiv>\n      <div><span class=\"m-label\">Timeline<\u002Fspan><span class=\"m-val\">2026 · Ongoing<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fheader>\n\n<div class=\"wrap\">\n  <div class=\"cs-cover\">\n    <div class=\"cc-top\"><span>Healthcare SaaS<\u002Fspan><span>Paid search lead<\u002Fspan><\u002Fdiv>\n    <div>\n      <div class=\"cc-metric\">−80%<\u002Fdiv>\n      <div class=\"cc-mlabel\">Lower cost per conversion across search campaigns.<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<section class=\"section\" style=\"padding-top:0;\">\n  <div class=\"wrap\">\n\n    <div class=\"cs-block\" data-screen-label=\"Challenge\">\n      <div class=\"b-label\"><img src=\"50840e7e-15ba-4dbf-b33e-d7f5875b8ea4\" alt=\"\">The challenge<\u002Fdiv>\n      <div>\n        <h2>Millions in paid search, and no clear read on the return.<\u002Fh2>\n        <p>This client is a B2B enterprise healthcare data and analytics platform. They were already spending millions a year on paid search, but weren't convinced it was earning a return.<\u002Fp>\n        <p>When I audited the account, the reason was clear. It had been built to chase leads and volume, not return. Spend was spread across product lines that brought in very little per line, and the program had never been measured against the one thing that mattered: what it gave back.<\u002Fp>\n        <p>I led the rebuild, working alongside a small team, with everything pointed at one thing: <strong>return<\u002Fstrong>.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"cs-block\" data-screen-label=\"Approach\">\n      <div class=\"b-label\"><img src=\"f63a12b4-893f-4449-9592-31c4ae0935c1\" alt=\"\">The approach<\u002Fdiv>\n      <div>\n        <h2>Start with cost per conversion, because that's where the waste was.<\u002Fh2>\n        <p>We didn't try to fix everything at once. Cost per conversion was sitting in the thousands, so that's where we started. Bring the cost of a qualified lead down, keep the ones that convert deeper into the funnel, and return follows even if volume dips in the short term.<\u002Fp>\n        <p>We audited every campaign against industry benchmarks for cost, click-through, and conversion rate, then let the gaps tell us which lever to pull.<\u002Fp>\n\n        <p class=\"lever-cap\">Which lever do we pull<\u002Fp>\n        <div class=\"lever\">\n          <div class=\"lever-row\">\n            <div><span class=\"lv-tag\">Low click-through<\u002Fspan><\u002Fdiv>\n            <span class=\"lv-arw\">→<\u002Fspan>\n            <p class=\"lv-diag\">The ads weren't earning the click<\u002Fp>\n            <span class=\"lv-arw\">→<\u002Fspan>\n            <p class=\"lv-fix\">Rewrite the ads: search term first, benefit second<\u002Fp>\n          <\u002Fdiv>\n          <div class=\"lever-row\">\n            <div><span class=\"lv-tag\">Healthy CTR, low conversion<\u002Fspan><\u002Fdiv>\n            <span class=\"lv-arw\">→<\u002Fspan>\n            <p class=\"lv-diag\">The landing page broke the promise the ad made<\u002Fp>\n            <span class=\"lv-arw\">→<\u002Fspan>\n            <p class=\"lv-fix\">Rebuild search-to-ad-to-page consistency<\u002Fp>\n          <\u002Fdiv>\n          <div class=\"lever-row\">\n            <div><span class=\"lv-tag\">Structural gaps<\u002Fspan><\u002Fdiv>\n            <span class=\"lv-arw\">→<\u002Fspan>\n            <p class=\"lv-diag\">Wrong schedules, placements, and audiences<\u002Fp>\n            <span class=\"lv-arw\">→<\u002Fspan>\n            <p class=\"lv-fix\">Fix ad schedules, placements, and audiences<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <p>When click-through was below benchmark, the ads weren't earning the click. Usually the keywords and the message didn't match what people were actually searching. One big find: they were leading with product specs while competitors led with outcomes. So I rewrote the ads to put the search term in the first pinned position and a real benefit in the second, backed by stats already sitting on their landing pages.<\u002Fp>\n        <p>When click-through was healthy but conversion was low, the problem was after the click. People landed on a page that didn't finish the promise the ad made. So I rebuilt the path until the search, the ad, and the landing page all said the same thing.<\u002Fp>\n\n        <div class=\"flow\">\n          <div class=\"flow-node\"><span class=\"fn-k\">Search term<\u002Fspan><p>What the buyer actually typed<\u002Fp><\u002Fdiv>\n          <span class=\"flow-arw\">→<\u002Fspan>\n          <div class=\"flow-node\"><span class=\"fn-k\">Ad<\u002Fspan><p>Leads with that term and a real benefit<\u002Fp><\u002Fdiv>\n          <span class=\"flow-arw\">→<\u002Fspan>\n          <div class=\"flow-node\"><span class=\"fn-k\">Landing page<\u002Fspan><p>Finishes the same promise<\u002Fp><\u002Fdiv>\n        <\u002Fdiv>\n\n        <p style=\"margin-top:26px;\">Then the structural work. Some campaigns were running content that wasn't built for mobile, on weekends, exactly when people search on their phones. We turned those off, reworked ad schedules, placements, and audiences, and brought back a few campaigns that had been quietly running with no one reporting on them.<\u002Fp>\n        <p>For the digging, we used SEMrush and Opus, audited competitor ads through Google's Ad Transparency Center, made changes in Google and Microsoft Ads, and reported everything in Looker Studio so the whole team could see the same numbers we did.<\u002Fp>\n        <div class=\"callout butter pull\"><span class=\"co-label\">The turn<\u002Fspan><p>The campaigns they were ready to walk away from had real demand underneath. It was the setup holding them back, not the market.<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n  <\u002Fdiv>\n<\u002Fsection>\n\n<div class=\"wrap\">\n  <div class=\"cs-figure\">\n    <div class=\"chart-panel\" data-screen-label=\"Cost per conversion chart\">\n      <div class=\"chart-head\">\n        <h3>Cost per conversion down, conversions up<\u002Fh3>\n        <div class=\"chart-legend\">\n          <span><i><\u002Fi>Cost per conversion<\u002Fspan>\n          <span><i class=\"up\"><\u002Fi>Conversions<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <svg class=\"chart-svg\" viewBox=\"0 0 820 340\" role=\"img\" aria-label=\"Line chart: cost per conversion holds high for four months, drops sharply at the month 5 relaunch and levels off low, while conversions dip at month 4 then climb. Indexed axes, no dollar values shown.\">\n        <!-- gridlines -->\n        <g stroke=\"rgba(255,255,255,.16)\" stroke-width=\"1\">\n          <line x1=\"60\" y1=\"40\" x2=\"790\" y2=\"40\"><\u002Fline>\n          <line x1=\"60\" y1=\"105\" x2=\"790\" y2=\"105\"><\u002Fline>\n          <line x1=\"60\" y1=\"170\" x2=\"790\" y2=\"170\"><\u002Fline>\n          <line x1=\"60\" y1=\"235\" x2=\"790\" y2=\"235\"><\u002Fline>\n          <line x1=\"60\" y1=\"300\" x2=\"790\" y2=\"300\"><\u002Fline>\n        <\u002Fg>\n        <!-- baseline -->\n        <line x1=\"60\" y1=\"300\" x2=\"790\" y2=\"300\" stroke=\"rgba(255,255,255,.5)\" stroke-width=\"1.5\"><\u002Fline>\n        <!-- relaunch marker (end of month 4 / month 5) -->\n        <line x1=\"425\" y1=\"48\" x2=\"425\" y2=\"300\" stroke=\"rgba(255,255,255,.4)\" stroke-width=\"1.2\" stroke-dasharray=\"4 5\"><\u002Fline>\n        <text x=\"425\" y=\"38\" fill=\"rgba(255,255,255,.72)\" font-family=\"'Anonymous Pro', monospace\" font-size=\"11.5\" text-anchor=\"middle\" letter-spacing=\"1\">RELAUNCH<\u002Ftext>\n        <!-- cost line (down) — white -->\n        <polyline fill=\"none\" stroke=\"#ffffff\" stroke-width=\"3.5\" stroke-linejoin=\"round\" stroke-linecap=\"round\" points=\"60,40 164,77 269,92 373,87 477,230 582,259 686,255 790,252\"><\u002Fpolyline>\n        <!-- conversions line (up) — butter -->\n        <polyline fill=\"none\" stroke=\"#FCE96A\" stroke-width=\"3.5\" stroke-linejoin=\"round\" stroke-linecap=\"round\" points=\"60,225 164,229 269,176 373,254 477,200 582,104 686,126 790,40\"><\u002Fpolyline>\n        <!-- cost markers -->\n        <g fill=\"#ffffff\">\n          <circle cx=\"60\" cy=\"40\" r=\"4.5\"><\u002Fcircle><circle cx=\"164\" cy=\"77\" r=\"4.5\"><\u002Fcircle><circle cx=\"269\" cy=\"92\" r=\"4.5\"><\u002Fcircle><circle cx=\"373\" cy=\"87\" r=\"4.5\"><\u002Fcircle>\n          <circle cx=\"477\" cy=\"230\" r=\"4.5\"><\u002Fcircle><circle cx=\"582\" cy=\"259\" r=\"4.5\"><\u002Fcircle><circle cx=\"686\" cy=\"255\" r=\"4.5\"><\u002Fcircle><circle cx=\"790\" cy=\"252\" r=\"4.5\"><\u002Fcircle>\n        <\u002Fg>\n        <!-- conversion markers -->\n        <g fill=\"#FCE96A\">\n          <circle cx=\"60\" cy=\"225\" r=\"4.5\"><\u002Fcircle><circle cx=\"164\" cy=\"229\" r=\"4.5\"><\u002Fcircle><circle cx=\"269\" cy=\"176\" r=\"4.5\"><\u002Fcircle><circle cx=\"373\" cy=\"254\" r=\"4.5\"><\u002Fcircle>\n          <circle cx=\"477\" cy=\"200\" r=\"4.5\"><\u002Fcircle><circle cx=\"582\" cy=\"104\" r=\"4.5\"><\u002Fcircle><circle cx=\"686\" cy=\"126\" r=\"4.5\"><\u002Fcircle><circle cx=\"790\" cy=\"40\" r=\"4.5\"><\u002Fcircle>\n        <\u002Fg>\n        <!-- x labels -->\n        <g fill=\"rgba(255,255,255,.7)\" font-family=\"'Anonymous Pro', monospace\" font-size=\"12.5\" text-anchor=\"middle\">\n          <text x=\"60\" y=\"325\">M1<\u002Ftext>\n          <text x=\"164\" y=\"325\">M2<\u002Ftext>\n          <text x=\"269\" y=\"325\">M3<\u002Ftext>\n          <text x=\"373\" y=\"325\">M4<\u002Ftext>\n          <text x=\"477\" y=\"325\">M5<\u002Ftext>\n          <text x=\"582\" y=\"325\">M6<\u002Ftext>\n          <text x=\"686\" y=\"325\">M7<\u002Ftext>\n          <text x=\"790\" y=\"325\">M8<\u002Ftext>\n        <\u002Fg>\n      <\u002Fsvg>\n      <p class=\"chart-note\">Representative trend · client details anonymized · indexed over an eight-month window, no spend shown<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<section class=\"section cs-results\" data-screen-label=\"Results\">\n  <div class=\"wrap\">\n    <div class=\"cs-block\" style=\"border-top:0; padding-top:0;\">\n      <div class=\"b-label\"><img src=\"e79700d6-83d7-45ed-95b6-59c8c5f05732\" alt=\"\">The results<\u002Fdiv>\n      <div>\n        <h2>Cost per conversion down 80%, and a program that finally pays back.<\u002Fh2>\n        <div class=\"results-grid\">\n          <div class=\"result\"><div class=\"num\">−80%<\u002Fdiv><div class=\"desc\">Cost per conversion across the search campaigns.<\u002Fdiv><\u002Fdiv>\n          <div class=\"result\"><div class=\"num\">$1.50<\u002Fdiv><div class=\"desc\">In qualified pipeline for every $1 spent, on an account newly measured against return.<\u002Fdiv><\u002Fdiv>\n          <div class=\"result\"><div class=\"num\">265<\u002Fdiv><div class=\"desc\">Marketing-qualified leads in 2026, up from single digits per campaign the year before.<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n        <p style=\"margin-top:36px;\">In the first half of the year, cost per conversion across the search campaigns dropped by 80%. Campaigns that had produced a handful of qualified leads across an entire prior year were now generating dozens each. And for the first time in a long time, the math ran in their favor: every dollar of spend was returning about <strong style=\"color:var(--cobalt);\">$1.50<\u002Fstrong> in qualified pipeline.<\u002Fp>\n        <p>We did it while spending meaningfully less than the account had in prior years, because the goal was never to spend more. It was to make the spend mean something.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section class=\"section cs-thread\" data-screen-label=\"Supporting thread\">\n  <div class=\"wrap\">\n    <div class=\"thread-panel\">\n      <p class=\"thread-label\"><img src=\"9e763eba-5241-4d07-b2f6-554f62e3cd94\" alt=\"\">The supporting thread<\u002Fp>\n      <div class=\"thread-grid\">\n        <h2>Paid search was where we proved it first.<\u002Fh2>\n        <p>Alongside the paid search rebuild, we also run the client's SEO and AEO program: clearing hundreds of technical issues, reworking existing content, and building visibility in the AI tools buyers now use to start their research. As spend tightened on certain business units, that organic and AI visibility helped carry them. It's part of the same push.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section class=\"cs-next\">\n  <div class=\"wrap\">\n    <a href=\"insurance.html\">\n      <div>\n        <p class=\"nlabel\">Next case study<\u002Fp>\n        <h3>A referral engine for an NJ insurance agency<\u002Fh3>\n      <\u002Fdiv>\n      <span class=\"arw-lg\">→<\u002Fspan>\n    <\u002Fa>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ FOOTER ============ -->\n<footer class=\"foot\">\n  <div class=\"wrap\">\n    <div class=\"grid cols-2\" style=\"align-items:end; gap:40px;\">\n      <div>\n        <p class=\"display is-condensed\" style=\"font-size:clamp(28px,5vw,48px); color:#fff;\">Amanda<span style=\"color:var(--butter);\">·<\u002Fspan>Figueroa<\u002Fp>\n        <p class=\"body-sm\" style=\"color:rgba(255,255,255,.6); margin-top:12px; max-width:42ch;\">Fractional growth marketer. Brand building and growth for B2B companies, startups, and agencies.<
